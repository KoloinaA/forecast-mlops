services:

  postgres:
    image: postgres:16

    container_name: postgres

    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: forecast_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  python:

    build:

      context: .

      dockerfile: docker/Dockerfile.python

    container_name: python-app

    depends_on:
      - postgres

    volumes:
      - .:/app

    working_dir: /app

    tty: true

volumes:

  postgres_data: